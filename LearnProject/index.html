<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Customer Feedback Survey</title>
    <!-- Bootstrap CSS -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <!-- External CSS -->
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary sticky-top">
      <div class="container">
        <a class="navbar-brand fw-bold" href="#">Survey Portal</a>
      </div>
    </nav>

    <!-- Introduction -->
    <section class="container text-center my-5">
      <h1 id="survey-title" class="mb-3">We Value Your Feedback</h1>
      <p class="intro-text">
        Please take a few minutes to complete this survey. Your feedback will
        help us improve our services and serve you better.
      </p>
    </section>

    <!-- Survey Form -->
    <section class="container mb-5">
      <div class="card shadow-lg border-0">
        <div class="card-body p-4">
          <form id="survey-form">
            <div class="row mb-3">
              <!-- Name -->
              <div class="col-md-6 mb-3 mb-md-0">
                <label for="name" class="form-label">Full Name</label>
                <input
                  type="text"
                  id="name"
                  class="form-control"
                  placeholder="Enter your name"
                  required
                />
              </div>
              <!-- Email -->
              <div class="col-md-6">
                <label for="email" class="form-label">Email Address</label>
                <input
                  type="email"
                  id="email"
                  class="form-control"
                  placeholder="Enter your email"
                  required
                />
              </div>
            </div>

            <div class="row mb-3">
              <!-- Age -->
              <div class="col-md-4 mb-3 mb-md-0">
                <label for="age" class="form-label">Age</label>
                <input
                  type="number"
                  id="age"
                  class="form-control"
                  placeholder="Enter your age"
                />
              </div>
              <!-- Services -->
              <div class="col-md-8">
                <label class="form-label"
                  >Which of our services do you use?</label
                ><br />
                <div class="form-check form-check-inline">
                  <input
                    type="checkbox"
                    id="service1"
                    class="form-check-input"
                  />
                  <label for="service1" class="form-check-label"
                    >Product A</label
                  >
                </div>
                <div class="form-check form-check-inline">
                  <input
                    type="checkbox"
                    id="service2"
                    class="form-check-input"
                  />
                  <label for="service2" class="form-check-label"
                    >Product B</label
                  >
                </div>
                <div class="form-check form-check-inline">
                  <input
                    type="checkbox"
                    id="service3"
                    class="form-check-input"
                  />
                  <label for="service3" class="form-check-label"
                    >Product C</label
                  >
                </div>
              </div>
            </div>

            <!-- Satisfaction (Radio Buttons) -->
            <div class="mb-3">
              <label class="form-label"
                >How satisfied are you with our services?</label
              >
              <div class="d-flex flex-wrap gap-3">
                <div class="form-check">
                  <input
                    type="radio"
                    name="satisfaction"
                    id="very-satisfied"
                    class="form-check-input"
                    required
                  />
                  <label for="very-satisfied" class="form-check-label"
                    >Very Satisfied</label
                  >
                </div>
                <div class="form-check">
                  <input
                    type="radio"
                    name="satisfaction"
                    id="satisfied"
                    class="form-check-input"
                  />
                  <label for="satisfied" class="form-check-label"
                    >Satisfied</label
                  >
                </div>
                <div class="form-check">
                  <input
                    type="radio"
                    name="satisfaction"
                    id="neutral"
                    class="form-check-input"
                  />
                  <label for="neutral" class="form-check-label">Neutral</label>
                </div>
                <div class="form-check">
                  <input
                    type="radio"
                    name="satisfaction"
                    id="unsatisfied"
                    class="form-check-input"
                  />
                  <label for="unsatisfied" class="form-check-label"
                    >Unsatisfied</label
                  >
                </div>
              </div>
            </div>

            <!-- Feedback -->
            <div class="mb-3">
              <label for="feedback" class="form-label">Your Feedback</label>
              <textarea
                id="feedback"
                class="form-control"
                rows="4"
                placeholder="Share your thoughts..."
              ></textarea>
            </div>

            <!-- Submit Button -->
            <button type="submit" class="btn btn-success w-100 py-2">
              Submit Survey
            </button>
          </form>
        </div>
      </div>
    </section>

    <!-- Footer -->
    <footer class="bg-light text-center py-3 border-top">
      <p class="mb-0">&copy; 2025 Survey Portal. All rights reserved.</p>
    </footer>

    <!-- Bootstrap JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
