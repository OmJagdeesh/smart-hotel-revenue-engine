<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DOM Manipulation with Bootstrap</title>
    <!-- Bootstrap CSS CDN -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
    <!-- jQuery CDN -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  </head>
  <body class="bg-light">
    <div class="container mt-5">
      <h1 id="myHeading" class="text-center mb-4">
        Welcome to DOM Manipulation
      </h1>

      <div class="mb-3">
        <p class="myClass alert alert-secondary">
          This is a paragraph with class "myClass".
        </p>
        <p class="myClass alert alert-secondary">
          Another paragraph with class "myClass".
        </p>
      </div>

      <div class="mb-3 d-flex flex-wrap gap-2">
        <button id="changeTextBtn" class="btn btn-primary">
          Change Heading Text
        </button>
        <button id="moveHeadingBtn" class="btn btn-warning">
          Move Heading
        </button>
        <button id="changeColorBtn" class="btn btn-danger">Change Color</button>
        <button id="changeImageBtn" class="btn btn-info">Change Image</button>
        <button id="addTextNodeBtn" class="btn btn-success">
          Add Text Node
        </button>
        <button id="deleteNodeBtn" class="btn btn-secondary">
          Delete Paragraph
        </button>
      </div>

      <div id="container" class="p-3 my-3 border rounded text-center">
        <img
          id="myImage"
          src="https://via.placeholder.com/200"
          class="img-fluid rounded"
          alt="Placeholder Image"
        />
      </div>

      <h3 class="mt-4">Form Example</h3>
      <form id="myForm" class="row g-3">
        <div class="col-md-6">
          <label for="nameInput" class="form-label">Name</label>
          <input type="text" class="form-control" id="nameInput" />
        </div>
        <div class="col-md-6">
          <label for="ageInput" class="form-label">Age</label>
          <input type="number" class="form-control" id="ageInput" />
        </div>
        <div class="col-12">
          <button type="submit" class="btn btn-primary">Submit</button>
        </div>
      </form>
    </div>

    <script src="script.js"></script>
    <!-- Bootstrap JS CDN -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
